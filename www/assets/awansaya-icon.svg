<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Awan Saya — mega-mendung-inspired layered cloud bands -->
  <rect width="64" height="64" rx="14" fill="#1a1a2e"/>

  <!-- Outer cloud band (darkest green) -->
  <g fill="#1e4a35">
    <rect x="4" y="34" width="56" height="18"/>
    <circle cx="16" cy="34" r="14"/>
    <circle cx="32" cy="30" r="16"/>
    <circle cx="48" cy="34" r="14"/>
  </g>

  <!-- Middle cloud band -->
  <g fill="#3a7d58">
    <rect x="12" y="38" width="40" height="14"/>
    <circle cx="22" cy="38" r="10"/>
    <circle cx="32" cy="35" r="12"/>
    <circle cx="42" cy="38" r="10"/>
  </g>

  <!-- Inner cloud band (brightest mint) -->
  <g fill="#5ee89e">
    <rect x="18" y="42" width="28" height="10"/>
    <circle cx="26" cy="42" r="7"/>
    <circle cx="32" cy="40" r="8"/>
    <circle cx="38" cy="42" r="7"/>
  </g>
</svg>
