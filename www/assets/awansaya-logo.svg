<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 248 64" width="248" height="64">
  <!-- Awan Saya — horizontal lockup: cloud icon + wordmark -->

  <!-- Icon -->
  <rect width="54" height="54" x="5" y="5" rx="12" fill="#1a1a2e"/>

  <!-- Outer cloud band -->
  <g fill="#1e4a35">
    <rect x="8" y="33" width="46" height="15"/>
    <circle cx="17" cy="33" r="11"/>
    <circle cx="32" cy="30" r="13"/>
    <circle cx="46" cy="33" r="11"/>
  </g>

  <!-- Middle cloud band -->
  <g fill="#3a7d58">
    <rect x="14" y="37" width="34" height="11"/>
    <circle cx="22" cy="37" r="8"/>
    <circle cx="32" cy="35" r="9"/>
    <circle cx="42" cy="37" r="8"/>
  </g>

  <!-- Inner cloud band -->
  <g fill="#5ee89e">
    <rect x="19" y="41" width="24" height="7"/>
    <circle cx="26" cy="41" r="5.5"/>
    <circle cx="32" cy="39" r="6.5"/>
    <circle cx="38" cy="41" r="5.5"/>
  </g>

  <!-- Wordmark: "Awan" in green + "Saya" in dark navy -->
  <text x="72" y="43" font-family="system-ui, -apple-system, sans-serif"
        font-size="30" font-weight="700" letter-spacing="0.5">
    <tspan fill="#2d7d46">Awan</tspan><tspan fill="#1a1a2e">Saya</tspan>
  </text>
</svg>
