<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Awan Saya</title>
  <link rel="stylesheet" href="/assets/styles/common.css">
  <link rel="stylesheet" href="/assets/styles/sign-in.css">
  <script src="/assets/scripts/password-toggle.js" defer></script>
</head>
<body>
  <div class="topnav">
    <a href="/" class="logo"><em>Awan</em>Saya</a>
    <div class="spacer"></div>
    <a href="/portal/" class="nav-link">Portal</a>
  </div>

  <div class="shell">
    <div class="card">
      <div id="signed-out-view">
        <h1>Sign In</h1>
        <p class="sub">Sign in to manage your hubs and access the portal.</p>
        <form id="login-form">
          <input name="email" type="email" placeholder="Email" autocomplete="username" required>
          <div class="password-field">
            <input id="login-password" name="password" type="password" placeholder="Password" autocomplete="current-password" required>
            <button class="password-toggle" type="button" data-password-toggle aria-controls="login-password" aria-pressed="false">Show</button>
          </div>
          <button type="submit">Sign In</button>
        </form>
        <div id="login-msg" class="msg hidden"></div>
        <div id="bootstrap-msg" class="msg warn hidden"></div>
      </div>

      <div id="signed-in-view" class="hidden">
        <h1>Signed In</h1>
        <p class="sub">Your session is active.</p>
        <div id="signed-in-msg" class="msg ok"></div>
        <div class="actions">
          <button id="continue-btn" type="button">Continue</button>
          <button id="logout-btn" type="button" class="secondary">Log out</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var nextUrl = '/portal/';
    try {
      var params = new URLSearchParams(location.search);
      var next = params.get('next');
      if (next && next.charAt(0) === '/') nextUrl = next;
    } catch (e) {}

    function setMessage(id, text, cls) {
      var el = document.getElementById(id);
      el.className = 'msg ' + cls;
      el.textContent = text;
      el.classList.remove('hidden');
    }

    function refreshAuthState() {
      return fetch('/api/auth-mode')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.bootstrapRequired) {
            setMessage('bootstrap-msg', 'No users are configured yet. The portal needs a bootstrap admin account before sign-in can be used.', 'warn');
          }
          if (data.authenticated && data.user) {
            document.getElementById('signed-out-view').classList.add('hidden');
            document.getElementById('signed-in-view').classList.remove('hidden');
            document.getElementById('signed-in-msg').textContent = 'Signed in as ' + (data.user.displayName || data.user.email) + '.';
          }
          return data;
        });
    }

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = this.elements.email.value.trim();
      var password = this.elements.password.value;
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      })
        .then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); })
        .then(function (result) {
          if (!result.ok) throw new Error(result.data.error || 'Sign in failed');
          window.location.href = nextUrl;
        })
        .catch(function (err) {
          setMessage('login-msg', err.message, 'error');
        });
    });

    document.getElementById('continue-btn').addEventListener('click', function () {
      window.location.href = nextUrl;
    });

    document.getElementById('logout-btn').addEventListener('click', function () {
      fetch('/api/logout', { method: 'POST' })
        .then(function () {
          window.location.reload();
        });
    });

    refreshAuthState();
  </script>
</body>
</html>
