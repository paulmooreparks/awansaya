<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Awan Saya</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: #222;
      background: #f4f5f7;
      line-height: 1.6;
    }
    .topnav {
      background: #1a1a2e;
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 24px;
    }
    .topnav .logo { font-weight: 700; font-size: 1.1rem; text-decoration: none; color: #fff; }
    .topnav .logo em { color: #5ee89e; font-style: normal; }
    .topnav .spacer { flex: 1; }
    .topnav a.nav-link { color: #ddd; text-decoration: none; font-size: 0.9rem; }
    .topnav a.nav-link:hover { color: #fff; border-bottom: 2px solid #5ee89e; }

    .shell {
      min-height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
    }
    h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .sub { color: #666; font-size: 0.95rem; margin-bottom: 20px; }
    form { display: flex; flex-direction: column; gap: 12px; }
    input {
      padding: 10px 12px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    button {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #2b2b43; }
    .secondary {
      background: transparent;
      color: #1a1a2e;
      border: 1px solid #ccd2da;
    }
    .secondary:hover { background: #f6f8fa; }
    .msg { margin-top: 12px; font-size: 0.9rem; }
    .error { color: #c0392b; }
    .ok { color: #2d7d46; }
    .warn { color: #9a6700; }
    .actions { display: flex; gap: 10px; margin-top: 16px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="topnav">
    <a href="/" class="logo"><em>Awan</em>Saya</a>
    <div class="spacer"></div>
    <a href="/portal/" class="nav-link">Portal</a>
  </div>

  <div class="shell">
    <div class="card">
      <div id="signed-out-view">
        <h1>Sign In</h1>
        <p class="sub">Sign in to manage your hubs and access the portal.</p>
        <form id="login-form">
          <input name="email" type="email" placeholder="Email" required>
          <input name="password" type="password" placeholder="Password" required>
          <button type="submit">Sign In</button>
        </form>
        <div id="login-msg" class="msg hidden"></div>
        <div id="bootstrap-msg" class="msg warn hidden"></div>
      </div>

      <div id="signed-in-view" class="hidden">
        <h1>Signed In</h1>
        <p class="sub">Your session is active.</p>
        <div id="signed-in-msg" class="msg ok"></div>
        <div class="actions">
          <button id="continue-btn" type="button">Continue</button>
          <button id="logout-btn" type="button" class="secondary">Log out</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var nextUrl = '/portal/';
    try {
      var params = new URLSearchParams(location.search);
      var next = params.get('next');
      if (next && next.charAt(0) === '/') nextUrl = next;
    } catch (e) {}

    function setMessage(id, text, cls) {
      var el = document.getElementById(id);
      el.className = 'msg ' + cls;
      el.textContent = text;
      el.classList.remove('hidden');
    }

    function refreshAuthState() {
      return fetch('/api/auth-mode')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.bootstrapRequired) {
            setMessage('bootstrap-msg', 'No users are configured yet. The portal needs a bootstrap admin account before sign-in can be used.', 'warn');
          }
          if (data.authenticated && data.user) {
            document.getElementById('signed-out-view').classList.add('hidden');
            document.getElementById('signed-in-view').classList.remove('hidden');
            document.getElementById('signed-in-msg').textContent = 'Signed in as ' + (data.user.displayName || data.user.email) + '.';
          }
          return data;
        });
    }

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = this.elements.email.value.trim();
      var password = this.elements.password.value;
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      })
        .then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); })
        .then(function (result) {
          if (!result.ok) throw new Error(result.data.error || 'Sign in failed');
          window.location.href = nextUrl;
        })
        .catch(function (err) {
          setMessage('login-msg', err.message, 'error');
        });
    });

    document.getElementById('continue-btn').addEventListener('click', function () {
      window.location.href = nextUrl;
    });

    document.getElementById('logout-btn').addEventListener('click', function () {
      fetch('/api/logout', { method: 'POST' })
        .then(function () {
          window.location.reload();
        });
    });

    refreshAuthState();
  </script>
</body>
</html>
